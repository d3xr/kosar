<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .bg { fill: #f5f6f1; }
      .panel { fill: #fff; stroke: #cfd3ce; stroke-width: 4; }
      .green { fill: #73c83d; stroke: #2d7a22; stroke-width: 6; }
      .green2 { fill: #a7df73; stroke: #2d7a22; stroke-width: 4; }
      .wheel { fill: #202629; stroke: #050606; stroke-width: 6; }
      .hub { fill: #727b80; stroke: #333; stroke-width: 4; }
      .bracket { fill: #101415; stroke: #000; stroke-width: 5; }
      .adapter { fill: #4a5156; stroke: #191c1f; stroke-width: 5; }
      .plywood { fill: #d7a75e; stroke: #885a23; stroke-width: 5; }
      .hover { fill: #6c7478; stroke: #202529; stroke-width: 6; }
      .battery { fill: #344554; stroke: #172635; stroke-width: 4; }
      .electronics { fill: #376397; stroke: #163c64; stroke-width: 4; }
      .blade { fill: #151819; stroke: #000; stroke-width: 6; }
      .ghost { fill: none; stroke: #aaa; stroke-width: 5; stroke-dasharray: 14 11; }
      .line { stroke: #111; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #333; stroke-width: 4; fill: none; stroke-dasharray: 10 10; }
      .num { fill: #111; }
      .numText { fill: #fff; font-size: 30px; font-weight: 700; text-anchor: middle; }
      .title { font-size: 46px; font-weight: 700; }
      .subtitle { font-size: 27px; }
      .h2 { font-size: 34px; font-weight: 700; }
      .label { font-size: 25px; }
      .small { font-size: 21px; }
      .tiny { font-size: 18px; }
      .white { fill: #fff; }
      .good { fill: #0d844b; }
      .bad { fill: #bd3030; }
      .warn { fill: #ba7100; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1200"/>
  <text class="title" x="60" y="70">MVP-схема: Greenworks + ховерборд-модуль</text>
  <text class="subtitle" x="60" y="112">Ховерборд не разбираем на моторы. Крепим целиком как задний приводной мост вместо штатных задних колёс.</text>

  <!-- Top view -->
  <rect class="panel" x="45" y="150" width="1050" height="985" rx="20"/>
  <text class="h2" x="90" y="205">Вид сверху: куда ставить ховер</text>
  <text class="label" x="90" y="245">Нос косилки сверху. Нож на MVP не подключать.</text>

  <!-- front direction -->
  <path class="line" d="M 575 290 L 575 245"/>
  <text class="label" x="600" y="270">нос / перед</text>

  <!-- stock front wheels -->
  <rect class="wheel" x="270" y="300" width="110" height="170" rx="45"/>
  <rect class="wheel" x="770" y="300" width="110" height="170" rx="45"/>

  <!-- mower deck -->
  <path class="green" d="M 270 390 C 270 300, 875 300, 880 390 L 910 675 C 915 810, 235 810, 240 675 Z"/>
  <circle class="green2" cx="575" cy="575" r="205"/>
  <circle class="green" cx="575" cy="575" r="78"/>
  <rect class="blade" x="330" y="558" width="490" height="34" rx="16" transform="rotate(-15 575 575)"/>
  <text class="label" x="480" y="585">нож OFF</text>

  <!-- removed rear wheels as ghosts -->
  <rect class="ghost" x="205" y="765" width="145" height="205" rx="55"/>
  <rect class="ghost" x="800" y="765" width="145" height="205" rx="55"/>

  <!-- rear brackets -->
  <rect class="bracket" x="310" y="755" width="85" height="135" rx="10"/>
  <rect class="bracket" x="755" y="755" width="85" height="135" rx="10"/>
  <circle class="white" cx="352" cy="790" r="11"/>
  <circle class="white" cx="352" cy="835" r="11"/>
  <circle class="white" cx="797" cy="790" r="11"/>
  <circle class="white" cx="797" cy="835" r="11"/>

  <!-- adapter frame -->
  <polygon class="adapter" points="350,888 405,888 455,925 385,925"/>
  <polygon class="adapter" points="745,888 800,888 765,925 695,925"/>
  <rect class="adapter" x="385" y="875" width="380" height="32" rx="6"/>

  <!-- hoverboard module -->
  <rect class="plywood" x="270" y="920" width="610" height="90" rx="10"/>
  <rect class="hover" x="335" y="980" width="480" height="120" rx="28"/>
  <circle class="wheel" cx="270" cy="1040" r="82"/>
  <circle class="wheel" cx="880" cy="1040" r="82"/>
  <circle class="hub" cx="270" cy="1040" r="40"/>
  <circle class="hub" cx="880" cy="1040" r="40"/>
  <rect class="battery" x="365" y="1016" width="185" height="58" rx="8"/>
  <rect class="electronics" x="645" y="1016" width="145" height="58" rx="8"/>
  <text class="label white" x="418" y="1053">АКБ</text>
  <text class="small white" x="663" y="1040">контроллер</text>
  <text class="small white" x="698" y="1065">ESP</text>

  <!-- numbered markers -->
  <circle class="num" cx="335" cy="745" r="25"/><text x="335" y="756" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">1</text>
  <circle class="num" cx="780" cy="745" r="25"/><text x="780" y="756" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">1</text>
  <circle class="num" cx="575" cy="890" r="25"/><text x="575" y="901" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">2</text>
  <circle class="num" cx="575" cy="948" r="25"/><text x="575" y="959" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">3</text>
  <circle class="num" cx="575" cy="1070" r="25"/><text x="575" y="1081" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">4</text>
  <circle class="num" cx="575" cy="575" r="25"/><text x="575" y="586" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">5</text>

  <!-- Side view -->
  <rect class="panel" x="1130" y="150" width="625" height="470" rx="20"/>
  <text class="h2" x="1175" y="205">Вид сбоку: высота оси</text>
  <text class="label" x="1175" y="245">Ховер ставим в район бывшей задней оси.</text>
  <line x1="1190" y1="535" x2="1710" y2="535" stroke="#111" stroke-width="4"/>
  <circle class="wheel" cx="1275" cy="498" r="56"/>
  <path class="green" d="M 1260 410 C 1330 315, 1505 315, 1585 410 L 1610 455 L 1235 455 Z"/>
  <rect class="green" x="1245" y="385" width="260" height="75" rx="34"/>
  <rect class="plywood" x="1510" y="428" width="170" height="38" rx="7"/>
  <rect class="hover" x="1515" y="455" width="175" height="75" rx="18"/>
  <circle class="wheel" cx="1595" cy="500" r="80"/>
  <circle class="hub" cx="1595" cy="500" r="34"/>
  <line class="dash" x1="1190" y1="500" x2="1710" y2="500"/>
  <text class="small" x="1190" y="490">линия осей</text>
  <path class="line" d="M 1690 315 C 1660 365, 1628 425, 1595 500"/>
  <text class="small" x="1440" y="300">ось ховера ≈ штатная задняя ось</text>

  <!-- Legend -->
  <rect class="panel" x="1130" y="655" width="625" height="480" rx="20"/>
  <text class="h2" x="1175" y="710">Легенда и решение</text>

  <circle class="num" cx="1195" cy="760" r="22"/><text x="1195" y="771" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">1</text>
  <text class="label" x="1230" y="768">Крепление к бывшим задним кронштейнам</text>

  <circle class="num" cx="1195" cy="815" r="22"/><text x="1195" y="826" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">2</text>
  <text class="label" x="1230" y="823">Адаптер: 2 боковины + поперечина</text>

  <circle class="num" cx="1195" cy="870" r="22"/><text x="1195" y="881" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">3</text>
  <text class="label" x="1230" y="878">Фанера/плита связывает половины ховера</text>

  <circle class="num" cx="1195" cy="925" r="22"/><text x="1195" y="936" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">4</text>
  <text class="label" x="1230" y="933">Ховер целиком: родной алюминий держит оси</text>

  <circle class="num" cx="1195" cy="980" r="22"/><text x="1195" y="991" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">5</text>
  <text class="label" x="1230" y="988">Нож Greenworks отключён физически</text>

  <circle class="bad" cx="1195" cy="1038" r="15"/>
  <text class="label" x="1230" y="1046">Мотор-колёса отдельно не цеплять на MVP</text>

  <circle class="warn" cx="1195" cy="1090" r="15"/>
  <text class="label" x="1230" y="1098">Первый тест: колёса в воздухе, 10–20%, XT60</text>
</svg>
